<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#7828C8" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#040209" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
  <!-- Decorative glowing sphere -->
  <circle cx="360" cy="150" r="100" fill="#8B5CF6" opacity="0.15" filter="url(#glow)"/>
  <circle cx="150" cy="360" r="120" fill="#4C1D95" opacity="0.2" filter="url(#glow)"/>
  <!-- Glass Note Page Icon -->
  <g transform="translate(128, 112)">
    <!-- Main page base -->
    <rect x="16" y="16" width="224" height="256" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="4" backdrop-filter="blur(10px)"/>
    <!-- Binder holes or spiral effect -->
    <rect x="0" y="48" width="32" height="12" rx="6" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <rect x="0" y="112" width="32" height="12" rx="6" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <rect x="0" y="176" width="32" height="12" rx="6" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <rect x="0" y="240" width="32" height="12" rx="6" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <!-- Pencil overlay -->
    <path d="M 200 40 L 220 60 L 120 160 L 90 170 L 100 140 Z" fill="url(#purpleGrad)" stroke="#FFFFFF" stroke-width="2" filter="url(#glow)"/>
    <!-- Details (Note lines) -->
    <line x1="64" y1="80" x2="180" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
    <line x1="64" y1="130" x2="160" y2="130" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
    <line x1="64" y1="180" x2="200" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
    <line x1="64" y1="230" x2="140" y2="230" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
